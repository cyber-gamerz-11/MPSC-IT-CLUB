<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
</head>
<body class="auth-page">
    <div class="futuristic-grid"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <div class="container auth-container">
        <div class="glass-card auth-card">
            <h2 class="auth-title">Set New Password</h2>
            <p class="auth-subtitle">Choose a secure password for your account</p>
            
            <form id="reset-form">
                <input type="hidden" name="token" value="{{ token }}">
                <div class="input-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary w-full">Update Password</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = 'Updating...';
            
            const formData = new FormData(e.target);
            const token = formData.get('token');
            
            try {
                const response = await fetch(`/auth/reset-password/${token}`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    window.showToast('Password updated! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/auth/login', 2000);
                } else {
                    window.showToast('Failed to update password.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Update Password';
                }
            } catch (err) {
                window.showToast('Error occurred.', 'error');
            }
        });
    </script>
</body>
</html>
