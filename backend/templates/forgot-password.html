<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
</head>
<body class="auth-page">
    <div class="futuristic-grid"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <div class="container auth-container">
        <div class="glass-card auth-card">
            <h2 class="auth-title">Account Recovery</h2>
            <p class="auth-subtitle">Enter your email to receive a reset link</p>
            
            <form id="forgot-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@email.com">
                </div>
                
                <button type="submit" class="btn-primary w-full">Send Reset Link</button>
            </form>
            
            <div class="auth-footer">
                <p>Remembered? <a href="/auth/login">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
