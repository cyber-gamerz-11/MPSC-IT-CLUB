<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC Panel | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <style>
        .ec-category-section { margin-bottom: 4rem; }
        .ec-category-title { color: var(--emerald-green); font-size: 1.8rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .ec-scroll-container { display: flex; overflow-x: auto; gap: 2rem; padding-bottom: 1.5rem; scroll-snap-type: x mandatory; }
        .ec-scroll-container::-webkit-scrollbar { height: 8px; }
        .ec-scroll-container::-webkit-scrollbar-thumb { background: var(--emerald-green); border-radius: 4px; }
        .ec-scroll-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
        
        .ec-card { 
            flex: 0 0 260px; /* Scaled down width */
            scroll-snap-align: start;
            text-align: center; 
            padding: 2rem 1.5rem; /* Scaled down padding */
            transition: 0.5s; 
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            opacity: 1 !important;
        }
        .ec-card:hover { 
            transform: translateY(-10px); /* Subtle lift */
            border-color: var(--emerald-green);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        }
        .ec-photo { 
            width: 140px; /* Scaled down photo */
            height: 140px; 
            border-radius: 50%; 
            border: 2px solid var(--emerald-green); 
            margin: 0 auto 1.2rem; 
            overflow: hidden;
            box-shadow: 0 0 15px var(--emerald-green);
            background: #111;
        }
        .ec-photo img { width: 100%; height: 100%; object-fit: cover; }
        .social-links { margin-top: 1.5rem; display: flex; justify-content: center; gap: 1rem; }
        .social-links a { 
            color: var(--white); 
            text-decoration: none; 
            font-size: 0.8rem; 
            padding: 5px 12px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .social-links a:hover { background: var(--emerald-green); color: var(--matte-black); border-color: var(--emerald-green); }

        /* Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%) !important;
            background-size: 200% 100% !important;
            animation: skeleton-loading 1.5s infinite linear !important;
            border-color: transparent !important;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Smooth Image Reveal */
        .ec-photo img {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="futuristic-grid"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    {% include 'components/navbar.html' %}

    <header class="page-header">
        <div class="container">
            <h1 class="hero-title">Executive Committee</h1>
            <p class="hero-subtitle">The visionaries leading MPSC IT CLUB towards excellence.</p>
        </div>
    </header>

    <section class="ec-section" style="padding-top: 4rem; padding-bottom: 5rem;">
        <div class="container">
            <div id="ec-container">
                <!-- Data loaded via API -->
            </div>
        </div>
    </section>

    {% include 'components/footer.html' %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/circularMenu.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('ec-container');
            
            // Show Skeletons instantly
            container.innerHTML = `
                <div class="ec-category-section">
                    <h2 class="ec-category-title skeleton" style="width: 300px; height: 35px; border: none; border-radius: 4px;"></h2>
                    <div class="ec-scroll-container">
                        ${Array(4).fill('<div class="glass-card ec-card skeleton" style="height: 400px; border-radius: 16px;"></div>').join('')}
                    </div>
                </div>
            `;

            const res = await fetch('/user/ec_list');
            const members = await res.json();

            if (members.length === 0) {
                container.innerHTML = '<p>The committee list is being updated.</p>';
                return;
            }

            const categories = { 
                BVB: 'Bangla Version Boys (BVB)', 
                BVG: 'Bangla Version Girls (BVG)', 
                EVB: 'English Version Boys (EVB)', 
                EVG: 'English Version Girls (EVG)' 
            };
            const grouped = { BVB: [], BVG: [], EVB: [], EVG: [] };

            members.forEach(m => {
                if (grouped[m.category]) {
                    grouped[m.category].push(m);
                }
            });

            let html = '';
            for (const [key, title] of Object.entries(categories)) {
                if (grouped[key].length > 0) {
                    html += `
                        <div class="ec-category-section">
                            <h2 class="ec-category-title">${title}</h2>
                            <div class="ec-scroll-container">
                                ${grouped[key].map(m => `
                                    <div class="glass-card ec-card">
                                        <div class="ec-photo">
                                            <img src="${m.image_path || '/static/assets/images/ec/default.jpg'}" alt="${m.name}">
                                        </div>
                                        <h3 class="emerald" style="text-transform: uppercase; letter-spacing: 2px;">${m.name}</h3>
                                        <p class="role" style="color: var(--soft-gray); font-weight: 600;">${m.designation}</p>
                                        
                                        <div class="social-links" style="flex-wrap: wrap;">
                                            ${m.facebook ? `<a href="${m.facebook}" target="_blank">Facebook</a>` : ''}
                                            ${m.instagram ? `<a href="${m.instagram}" target="_blank">Instagram</a>` : ''}
                                            ${m.website ? `<a href="${m.website}" target="_blank">Website</a>` : ''}
                                            ${m.whatsapp ? `<a href="https://wa.me/${m.whatsapp.replace(/[^0-9]/g, '')}" target="_blank">WhatsApp</a>` : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            container.innerHTML = html;

            gsap.from('.ec-category-section', { 
                opacity: 0, 
                y: 50, 
                stagger: 0.3, 
                duration: 1, 
                ease: "power3.out",
                clearProps: "all" 
            });
        });
    </script>
</body>
</html>
