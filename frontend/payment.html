<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="auth-page">
    <div class="futuristic-grid"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <div class="container auth-container">
        <div class="glass-card auth-card">
            <h2 class="auth-title">bKash Payment</h2>
            <p class="auth-subtitle">Follow instructions to complete registration</p>
            
            <div class="payment-instructions glass-card mb-2 text-left">
                <p><strong>1. Send Money</strong> to: <span class="emerald">017XXXXXXXX</span></p>
                <p><strong>2. Use Reference:</strong> <span id="ref-member-id">MPSC-2026-001</span></p>
                <p><strong>3. Submit TxID</strong> below</p>
            </div>

            <form id="payment-form">
                <input type="hidden" name="event_id" id="event_id">
                <input type="hidden" name="event_name" id="event_name">
                
                <div class="input-group">
                    <label for="sender_number">bKash Number (Sender)</label>
                    <input type="tel" id="sender_number" name="sender_number" required placeholder="01XXXXXXXXX">
                </div>
                
                <div class="input-group">
                    <label for="transaction_id">Transaction ID (TxID)</label>
                    <input type="text" id="transaction_id" name="transaction_id" required placeholder="AX72BZ99">
                </div>

                <div class="input-group">
                    <label for="screenshot">Payment Screenshot (Optional)</label>
                    <input type="file" id="screenshot" name="screenshot">
                </div>

                <button type="submit" class="btn-primary w-full">Submit Verification</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Get event info from URL params
            const params = new URLSearchParams(window.location.search);
            document.getElementById('event_id').value = params.get('id');
            document.getElementById('event_name').value = params.get('name');
            
            // Fetch member ID for reference
            const res = await fetch('/user/profile_data');
            if (res.ok) {
                const user = await res.json();
                document.getElementById('ref-member-id').innerText = user.member_id;
            }
        });

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            const response = await fetch('/payments/submit', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                alert('Payment submitted! Admin will verify soon.');
                window.location.href = '/dashboard.html';
            } else {
                alert('Submission failed.');
            }
        });
    </script>
</body>
</html>
