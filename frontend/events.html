<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="futuristic-grid"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <nav class="scrolled">
        <div class="container nav-content">
            <div class="logo">
                <a href="index.html">MPSC <span class="emerald">IT CLUB</span></a>
            </div>
            <a href="dashboard.html" class="btn-primary">Dashboard</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 class="hero-title">Events</h1>
            <p class="hero-subtitle">Participate in our upcoming competitions and workshops.</p>
        </div>
    </header>

    <section class="events-list">
        <div class="container">
            <div class="events-grid" id="events-container">
                <!-- Events will be loaded here -->
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('events-container');
            try {
                const response = await fetch('/events/');
                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = '<p>No events scheduled at the moment.</p>';
                    return;
                }

                events.forEach(event => {
                    const card = document.createElement('div');
                    card.className = 'glass-card event-card';
                    card.innerHTML = `
                        <div class="event-badge ${event.status.toLowerCase()}">${event.status}</div>
                        <img src="${event.banner || 'assets/images/event-placeholder.jpg'}" alt="${event.title}" class="event-banner">
                        <h3>${event.title}</h3>
                        <p class="event-desc">${event.description}</p>
                        <div class="event-details">
                            <span><i class="icon-calendar"></i> ${event.date}</span>
                            <span><i class="icon-location"></i> ${event.venue}</span>
                        </div>
                        <button class="btn-primary w-full mt-1" onclick="registerEvent('${event._id}')">Register Now</button>
                    `;
                    container.appendChild(card);
                });

                gsap.from('.event-card', { opacity: 0, y: 30, stagger: 0.2, duration: 0.8 });

            } catch (err) {
                console.error('Error loading events:', err);
            }
        });

        async function registerEvent(eventId) {
            // Check login status first
            const res = await fetch('/user/profile_data');
            if (!res.ok) {
                alert('Please login to register.');
                window.location.href = '/login.html';
                return;
            }

            const response = await fetch('/events/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_id: eventId })
            });

            if (response.ok) {
                alert('Successfully registered!');
            } else {
                alert('Registration failed.');
            }
        }
    </script>
</body>
</html>
