<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="dashboard-page">
    <div class="futuristic-grid"></div>

    <nav class="scrolled">
        <div class="container nav-content">
            <div class="logo">
                <a href="index.html">ADMIN <span class="emerald">PANEL</span></a>
            </div>
            <a href="/auth/logout" class="btn-secondary">Logout</a>
        </div>
    </nav>

    <div class="container dashboard-container">
        <aside class="dashboard-sidebar glass-card">
            <ul class="sidebar-nav">
                <li class="active"><a href="#payments">Verify Payments</a></li>
                <li><a href="#events">Manage Events</a></li>
                <li><a href="#users">Users List</a></li>
                <li><a href="#gallery">Gallery</a></li>
            </ul>
        </aside>

        <main class="dashboard-main">
            <!-- Payment Verification Section -->
            <section id="payments-section" class="dash-section">
                <h2 class="section-title">Pending Payments</h2>
                <div class="glass-card table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Member ID</th>
                                <th>Event</th>
                                <th>TxID</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="pending-payments-body">
                            <!-- Rows will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load pending payments
            const res = await fetch('/payments/all_pending');
            if (res.ok) {
                const payments = await res.json();
                const body = document.getElementById('pending-payments-body');
                
                payments.forEach(p => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${p.member_id}</td>
                        <td>${p.event_name}</td>
                        <td>${p.transaction_id}</td>
                        <td>${p.amount}</td>
                        <td>
                            <button class="btn-primary btn-sm" onclick="verifyPayment('${p._id}', 'verified')">Approve</button>
                            <button class="btn-secondary btn-sm" onclick="verifyPayment('${p._id}', 'rejected')">Reject</button>
                        </td>
                    `;
                    body.appendChild(row);
                });
            }
        });

        async function verifyPayment(id, status) {
            const res = await fetch('/payments/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status })
            });
            if (res.ok) {
                location.reload();
            }
        }
    </script>
</body>
</html>
