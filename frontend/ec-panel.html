<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC Panel | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="futuristic-grid"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <nav class="scrolled">
        <div class="container nav-content">
            <div class="logo">
                <a href="index.html">MPSC <span class="emerald">IT CLUB</span></a>
            </div>
            <a href="index.html" class="btn-primary">Home</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 class="hero-title">EC Panel</h1>
            <p class="hero-subtitle">The leadership behind the innovation.</p>
        </div>
    </header>

    <section class="ec-grid-section">
        <div class="container">
            <div class="ec-grid">
                <!-- President -->
                <div class="glass-card ec-card">
                    <div class="ec-photo">
                        <img src="https://i.pravatar.cc/300?img=11" alt="President">
                    </div>
                    <h3>John Doe</h3>
                    <p class="role">President</p>
                    <p class="skills">Full Stack Developer | AI Enthusiast</p>
                    <div class="social-links">
                        <a href="#">LinkedIn</a>
                        <a href="#">GitHub</a>
                    </div>
                </div>

                <!-- Secretary -->
                <div class="glass-card ec-card">
                    <div class="ec-photo">
                        <img src="https://i.pravatar.cc/300?img=5" alt="Secretary">
                    </div>
                    <h3>Jane Smith</h3>
                    <p class="role">General Secretary</p>
                    <p class="skills">UI/UX Designer | Public Speaker</p>
                    <div class="social-links">
                        <a href="#">LinkedIn</a>
                        <a href="#">Behance</a>
                    </div>
                </div>

                <!-- Add more members here -->
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        gsap.from('.ec-card', {
            opacity: 0,
            y: 50,
            stagger: 0.2,
            duration: 1
        });
    </script>
</body>
</html>
