<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="futuristic-grid"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <nav class="scrolled">
        <div class="container nav-content">
            <div class="logo">
                <a href="index.html">MPSC <span class="emerald">IT CLUB</span></a>
            </div>
            <a href="index.html" class="btn-primary">Home</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 class="hero-title">Visual Journey</h1>
            <p class="hero-subtitle">Capturing moments of innovation and teamwork.</p>
        </div>
    </header>

    <section class="gallery-section">
        <div class="container">
            <div class="gallery-masonry" id="gallery-container">
                <!-- Gallery items -->
                <div class="gallery-item glass-card">
                    <img src="https://picsum.photos/400/600?random=1" alt="Gallery">
                    <div class="gallery-overlay">
                        <p>Tech Workshop 2026</p>
                    </div>
                </div>
                <div class="gallery-item glass-card">
                    <img src="https://picsum.photos/400/300?random=2" alt="Gallery">
                    <div class="gallery-overlay">
                        <p>Programming Contest</p>
                    </div>
                </div>
                <div class="gallery-item glass-card">
                    <img src="https://picsum.photos/400/500?random=3" alt="Gallery">
                    <div class="gallery-overlay">
                        <p>EC Meeting</p>
                    </div>
                </div>
                <div class="gallery-item glass-card">
                    <img src="https://picsum.photos/400/400?random=4" alt="Gallery">
                    <div class="gallery-overlay">
                        <p>Robotics Seminar</p>
                    </div>
                </div>
                <div class="gallery-item glass-card">
                    <img src="https://picsum.photos/400/700?random=5" alt="Gallery">
                    <div class="gallery-overlay">
                        <p>Annual Science Fair</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        gsap.from('.gallery-item', {
            opacity: 0,
            scale: 0.9,
            stagger: 0.2,
            duration: 1,
            ease: "power2.out"
        });
    </script>
</body>
</html>
