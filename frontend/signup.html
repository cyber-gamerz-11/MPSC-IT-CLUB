<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MPSC IT CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="auth-page">
    <div class="futuristic-grid"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <div class="container auth-container">
        <div class="glass-card auth-card">
            <h2 class="auth-title">Join the Future</h2>
            <p class="auth-subtitle">Create your member account</p>
            
            <form id="signup-form">
                <div class="form-row">
                    <div class="input-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" required placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="institution">Institution</label>
                        <input type="text" id="institution" name="institution" required placeholder="MPSC">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <label for="class">Class</label>
                        <input type="text" id="class" name="class" required placeholder="e.g. 10, 12">
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="017XXXXXXXX">
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@email.com">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <div class="input-group">
                    <label for="skills">Skills / Interests (Comma separated)</label>
                    <input type="text" id="skills" name="skills" placeholder="Web Dev, Python, Graphics">
                </div>

                <button type="submit" class="btn-primary w-full">Join Club</button>
            </form>
            
            <div class="auth-footer">
                <p>Already a member? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
